
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Diary Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#333,#764ba2);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
text-align:center;
max-width:700px;
padding:40px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

p{
font-size:18px;
margin-bottom:40px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
}

button{
padding:14px 30px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.login{
background:white;
color:#333;
}

.signup{
background:#ffd369;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>📔 My Diary Planner</h1>

<p>Write your thoughts, track meetings and manage tasks in one beautiful space.</p>

<div class="buttons">

<a href="login.html">
<button class="login">Login</button>
</a>

<a href="signup.html">
<button class="signup">Sign Up</button>
</a>

</div>

</div>

</body>
</html>
